<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:800px; overflow:hidden; font-family:'Segoe UI',-apple-system,sans-serif; }
  body {
    display:flex; align-items:center; gap:60px; padding:0 80px;
    background:linear-gradient(180deg,#f5a623 0%,#f7864f 22%,#f4615e 44%,#e24e7b 62%,#9e3a6e 80%,#16263f 100%);
    position:relative;
  }
  body::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 9px);}
  .left{flex:1;z-index:1;color:#fff;}
  .logo{width:110px;height:110px;border-radius:24px;margin-bottom:26px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  h1{font-size:64px;line-height:1.05;letter-spacing:-1px;text-shadow:0 3px 10px rgba(0,0,0,.3);}
  .sub{font-size:26px;margin-top:18px;color:#fff5ec;font-weight:500;max-width:560px;line-height:1.4;}
  .bullets{margin-top:34px;display:flex;flex-direction:column;gap:14px;}
  .b{display:flex;align-items:center;gap:14px;font-size:21px;font-weight:600;}
  .dot{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:18px;}
  /* popup mock */
  .mock{width:380px;border-radius:18px;overflow:hidden;z-index:1;box-shadow:0 30px 70px rgba(0,0,0,.45);background:#16263f;}
  .mh{background:linear-gradient(180deg,#f5a623,#f7864f);padding:20px;text-align:center;}
  .mh h2{color:#2a1530;font-size:22px;}
  .mh p{color:#4a1f3a;font-size:12px;font-style:italic;font-weight:600;}
  .mb{padding:18px;}
  .card{background:rgba(16,27,48,.6);border:1px solid rgba(255,233,207,.25);border-radius:10px;padding:14px;margin-bottom:14px;}
  .lab{color:#f5a623;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .inp{background:rgba(8,14,28,.7);border:1px solid rgba(255,233,207,.2);border-radius:6px;padding:9px 11px;color:#cdbfae;font-size:13px;margin-bottom:10px;}
  .btn{background:linear-gradient(180deg,#f7864f,#e24e7b);color:#fff;text-align:center;padding:11px;border-radius:6px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;}
  .item{background:rgba(16,27,48,.5);border:1px solid rgba(255,233,207,.18);border-left:3px solid #f4615e;border-radius:8px;padding:12px;}
  .item h3{color:#fff;font-size:14px;}
  .item .ep{color:#f5a623;font-size:12px;margin-top:3px;}
  .item .lk{color:#00d4ff;font-size:11px;margin-top:3px;}
</style></head><body>
  <div class="left">
    <img class="logo" src="../images/icon-128.png">
    <h1>Anime Fans<br>Tracker</h1>
    <div class="sub">Track every episode, and let Netflix run the binge for you.</div>
    <div class="bullets">
      <div class="b"><span class="dot">📺</span> Save your spot in every anime</div>
      <div class="b"><span class="dot">⏭️</span> Auto-skip Netflix intros</div>
      <div class="b"><span class="dot">🌐</span> Works in every language</div>
    </div>
  </div>
  <div class="mock">
    <div class="mh"><h2>Anime Fans Tracker</h2><p>Track • Auto-Skip</p></div>
    <div class="mb">
      <div class="card">
        <div class="lab">Anime Title</div>
        <div class="inp">Jujutsu Kaisen</div>
        <div class="lab">Current Episode</div>
        <div class="inp">12</div>
        <div class="btn">Save Anime</div>
      </div>
      <div class="item"><h3>Jujutsu Kaisen</h3><div class="ep">Ep: 12</div><div class="lk">Open link →</div></div>
    </div>
  </div>
</body></html>
