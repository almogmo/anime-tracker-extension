<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Fans Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #e94560;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 12px;
      color: #b0b0b0;
      font-style: italic;
    }

    /* Main Container */
    .container {
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }

    .container::-webkit-scrollbar {
      width: 6px;
    }

    .container::-webkit-scrollbar-track {
      background: #1a1a2e;
    }

    .container::-webkit-scrollbar-thumb {
      background: #e94560;
      border-radius: 3px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: #ff6b7a;
    }

    /* Input Section */
    .input-section {
      background: rgba(15, 52, 96, 0.5);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #e94560;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: #0d0d1f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #e94560;
      box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
      background: #1a1a2e;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-add {
      background: linear-gradient(135deg, #e94560 0%, #ff6b7a 100%);
      color: white;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    .btn-clear {
      background: #2a2a3e;
      color: #b0b0b0;
      border: 1px solid #444;
    }

    .btn-clear:hover {
      background: #3a3a4e;
      color: #e0e0e0;
    }

    /* Settings Section */
    .settings-section {
      background: rgba(15, 52, 96, 0.5);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: #00d4ff;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .toggle-switch label {
      margin: 0;
      font-size: 13px;
      color: #e0e0e0;
      text-transform: none;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #2a2a3e;
      transition: 0.3s;
      border-radius: 24px;
      border: 1px solid #444;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 2px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(135deg, #e94560 0%, #ff6b7a 100%);
      border-color: #e94560;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* Anime List */
    .anime-list {
      margin-top: 10px;
    }

    .anime-item {
      background: rgba(83, 52, 131, 0.2);
      padding: 14px;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 3px solid #e94560;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    .anime-item:hover {
      background: rgba(83, 52, 131, 0.35);
      border-color: #e94560;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.2);
    }

    .anime-info h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 4px;
    }

    .anime-info p {
      font-size: 12px;
      color: #00d4ff;
    }

    .anime-actions {
      display: flex;
      gap: 6px;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 11px;
      background: #2a2a3e;
      color: #b0b0b0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-small:hover {
      background: #3a3a4e;
      color: #e0e0e0;
      border-color: #e94560;
    }

    .btn-delete {
      background: rgba(233, 69, 96, 0.2);
      color: #ff6b7a;
      border-color: #e94560;
    }

    .btn-delete:hover {
      background: #e94560;
      color: white;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #666;
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 10px;
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 13px;
      color: #888;
    }

    /* Footer */
    footer {
      background: rgba(15, 20, 40, 0.8);
      padding: 12px;
      text-align: center;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>Anime Fans Tracker</h1>
    <p class="subtitle">Track • Block • Auto-Skip</p>
  </header>

  <div class="container">
    <!-- Input Section -->
    <div class="input-section">
      <form id="animeForm">
        <div class="form-group">
          <label for="animeTitle">Anime Title</label>
          <input
            type="text"
            id="animeTitle"
            placeholder="e.g., Jujutsu Kaisen"
            required
          >
        </div>

        <div class="form-group">
          <label for="currentEpisode">Current Episode</label>
          <input
            type="number"
            id="currentEpisode"
            min="1"
            placeholder="e.g., 5"
            required
          >
        </div>

        <p style="font-size: 11px; color: #888; margin: 4px 0 12px;">
          The current tab's link &amp; a preview are captured automatically.
        </p>

        <div class="button-group">
          <button type="submit" class="btn-add">+ Add Anime</button>
          <button type="reset" class="btn-clear">Clear</button>
        </div>
      </form>
    </div>

    <!-- Settings Section -->
    <div class="settings-section">
      <div class="settings-title">Features</div>

      <div class="toggle-switch">
        <label for="spoilerShield">Anti-Spoiler Shield</label>
        <label class="switch">
          <input type="checkbox" id="spoilerShield" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-switch">
        <label for="netflixAutoSkip">Netflix Auto-Skip</label>
        <label class="switch">
          <input type="checkbox" id="netflixAutoSkip" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Anime List -->
    <div class="input-section">
      <div class="settings-title">Your Anime List</div>
      <div id="animeListContainer" class="anime-list">
        <div class="empty-state">
          <div class="empty-state-icon"></div>
          <p>No anime tracked yet. Add one above!</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>v1.0.0 • Made for anime fans • Block spoilers, never miss an episode</p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
