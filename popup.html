<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Fans Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== Sunset palette ===== */
    :root {
      --amber:   #f5a623;
      --orange:  #f7864f;
      --coral:   #f4615e;
      --pink:    #e24e7b;
      --magenta: #c43d77;
      --navy:    #16263f;
      --navy-2:  #0f1b30;
      --cream:   #ffe9cf;
    }

    body {
      width: 420px;
      color: #f3e9df;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      position: relative;
      /* vertical sunset gradient */
      background:
        linear-gradient(180deg,
          #f5a623 0%,
          #f7864f 20%,
          #f4615e 40%,
          #e24e7b 58%,
          #9e3a6e 76%,
          #16263f 100%);
    }

    /* faint horizontal "scanlines" texture over everything */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.05) 0px,
        rgba(255, 255, 255, 0.05) 1px,
        transparent 1px,
        transparent 7px
      );
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* Header */
    header {
      background: linear-gradient(180deg, rgba(245,166,35,0.95) 0%, rgba(247,134,79,0.9) 100%);
      padding: 22px 20px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 18px rgba(196, 61, 119, 0.35);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #2a1530;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 12px;
      color: #4a1f3a;
      font-style: italic;
      font-weight: 600;
    }

    /* Main Container */
    .container {
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }

    .container::-webkit-scrollbar { width: 6px; }
    .container::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); }
    .container::-webkit-scrollbar-thumb { background: var(--coral); border-radius: 3px; }
    .container::-webkit-scrollbar-thumb:hover { background: var(--pink); }

    /* Cards — translucent deep navy so the sunset glows behind */
    .input-section,
    .settings-section {
      background: rgba(16, 27, 48, 0.55);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 233, 207, 0.25);
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .form-group { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="number"],
    input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      background: rgba(8, 14, 28, 0.7);
      border: 1px solid rgba(255, 233, 207, 0.2);
      border-radius: 6px;
      color: #f3e9df;
      font-size: 14px;
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--coral);
      box-shadow: 0 0 12px rgba(244, 97, 94, 0.4);
      background: rgba(16, 27, 48, 0.9);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-add {
      background: linear-gradient(180deg, var(--orange) 0%, var(--pink) 100%);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(226, 78, 123, 0.45);
    }

    .btn-add:active { transform: translateY(0); }

    .btn-clear {
      background: rgba(255, 255, 255, 0.08);
      color: #f3e9df;
      border: 1px solid rgba(255, 233, 207, 0.25);
    }

    .btn-clear:hover { background: rgba(255, 255, 255, 0.16); }

    .settings-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .toggle-switch label {
      margin: 0;
      font-size: 13px;
      color: #f3e9df;
      text-transform: none;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: 0.3s;
      border-radius: 24px;
      border: 1px solid rgba(255, 233, 207, 0.25);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 2px;
      background-color: #fff;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(180deg, var(--orange) 0%, var(--pink) 100%);
      border-color: var(--coral);
    }

    input:checked + .slider:before { transform: translateX(24px); }

    /* Anime List */
    .anime-list { margin-top: 10px; }

    .anime-item {
      background: rgba(16, 27, 48, 0.5);
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 3px solid var(--coral);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 233, 207, 0.18);
      border-left: 3px solid var(--coral);
    }

    .anime-item:hover {
      background: rgba(196, 61, 119, 0.18);
      box-shadow: 0 4px 14px rgba(226, 78, 123, 0.25);
    }

    .anime-info h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
    .anime-info p { font-size: 12px; color: var(--amber); }

    .anime-actions { display: flex; gap: 6px; }

    .btn-small {
      padding: 6px 10px;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.08);
      color: #f3e9df;
      border: 1px solid rgba(255, 233, 207, 0.22);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-small:hover { background: rgba(255, 255, 255, 0.16); border-color: var(--coral); }

    .btn-delete {
      background: rgba(244, 97, 94, 0.18);
      color: #ffd0cd;
      border-color: var(--coral);
    }

    .btn-delete:hover { background: var(--coral); color: #fff; }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: rgba(243, 233, 223, 0.7);
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.6; }
    .empty-state p { font-size: 13px; color: rgba(243, 233, 223, 0.65); }

    /* Footer */
    footer {
      background: rgba(15, 27, 48, 0.85);
      padding: 12px;
      text-align: center;
      border-top: 1px solid rgba(255, 233, 207, 0.2);
      font-size: 11px;
      color: rgba(243, 233, 223, 0.6);
    }
  </style>
</head>
<body>
  <header>
    <h1>Anime Fans Tracker</h1>
    <p class="subtitle">Track • Auto-Skip</p>
  </header>

  <div class="container">
    <!-- Input Section -->
    <div class="input-section">
      <form id="animeForm">
        <div class="form-group">
          <label for="animeTitle">Anime Title</label>
          <input
            type="text"
            id="animeTitle"
            placeholder="e.g., Jujutsu Kaisen"
            required
          >
        </div>

        <div class="form-group">
          <label for="currentEpisode">Current Episode</label>
          <input
            type="number"
            id="currentEpisode"
            min="1"
            placeholder="e.g., 5"
            required
          >
        </div>

        <p style="font-size: 11px; color: #888; margin: 4px 0 12px;">
          The current tab's link is saved automatically.
        </p>

        <div class="button-group">
          <button type="submit" class="btn-add">Save Anime</button>
          <button type="reset" class="btn-clear">Clear</button>
        </div>
      </form>
    </div>

    <!-- Settings Section -->
    <div class="settings-section">
      <div class="settings-title">Features</div>

      <div class="toggle-switch">
        <label for="netflixAutoSkip">Netflix Auto-Skip</label>
        <label class="switch">
          <input type="checkbox" id="netflixAutoSkip" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Anime List -->
    <div class="input-section">
      <div class="settings-title">Your Anime List</div>
      <div id="animeListContainer" class="anime-list">
        <div class="empty-state">
          <div class="empty-state-icon"></div>
          <p>No anime tracked yet. Add one above!</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>v1.0.0 • Made for anime fans • Track episodes, never miss one</p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
